<div class="navbar-wrapper">
  <nav class="navbar navbar-expand-sm" aria-label="Main navigation">
    <img
      (click)="scrollToSection('music')"
      class="nav-logo hover-item"
      src="/assets/images/crbrvs_logo.png"
      alt="CRBRVS Logo"
    />

    <app-hamburger-button
      [isOpen]="isMenuOpen()"
      (toggleMenu)="onToggleMenu($event)"
      aria-controls="main-nav"
    ></app-hamburger-button>
    <div
      class="navbar-collapse justify-content-end"
      [class.show]="isMenuOpen()"
      id="main-nav"
    >
      <ul class="navbar-nav">
        <li class="nav-item">
          <a href="#music" class="nav-link" (click)="scrollToSection('music')"
            >Music</a
          >
        </li>
        <li class="nav-item">
          <a href="#merch" class="nav-link" (click)="scrollToSection('merch')"
            >Merch</a
          >
        </li>
        <li class="nav-item">
          <a
            href="#contact"
            class="nav-link"
            (click)="scrollToSection('contact')"
            >Contact</a
          >
        </li>
      </ul>
    </div>
  </nav>
  <div class="headline-intro-text">Redefining rap.</div>
  <div id="background-image-header"></div>
</div>
